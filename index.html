<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inbox Puzzles</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #ffffff;
    padding: 30px 20px;
    border-radius: 16px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  h1 {
    color: #008080;
    font-size: 26px;
    margin-bottom: 10px;
  }

  .subtext {
    font-size: 15px;
    color: #555;
    margin-bottom: 20px;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 12px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    background: #d8c178;
    color: #fff;
    cursor: pointer;
  }

  button:hover {
    background: #cbb167;
  }

  .fineprint {
    font-size: 12px;
    color: #888;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="card">

  <h1>Enjoy Your Daily Dose of Puzzles</h1>

  <div class="subtext">
    Crossword, Word Search, Sudoku & Cryptojoke — delivered daily to your inbox
  </div>

  <form method="post" action="https://sendsteed.com/subscribe/">

    <!-- REQUIRED FIELDS -->
    <input type="hidden" name="lllid" value="124212">
    <input type="hidden" name="lluid" value="chrisabbe">
    <input type="hidden" name="redirect" value="https://google.com">

    <!-- EMAIL -->
    <input 
      type="text" 
      name="e124212" 
      placeholder="your@email.com" 
      required
    >

    <!-- BUTTON -->
    <button type="submit">
      Start My Free 7-Day Trial
    </button>

  </form>

  <div class="fineprint">
    Free 7-day trial. Unsubscribe anytime.
  </div>

</div>

</body>
</html>
